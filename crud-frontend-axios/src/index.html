<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD JS Project</title>

    <!-- 1. Nosso reset primeiro -->
    <link rel="stylesheet" href="styles/reset.css">

    <!-- 2. Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 3. Nosso CSS por último (sobrescreve) -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header class="bg-dark text-white py-4 mb-4">
        <h1 class="text-center m-0">PHP/JS CRUD Project</h1>

        <!-- Message to delete some product -->

        <div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Delete Confirmation</h5>
                </div>
                <div class="modal-body">
                    Are you sure you want to delete this product?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal" id="noModalDelete">No</button>
                    <button type="button" class="btn btn-primary" id="yes-modal-delete">Yes</button>
                </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">

        <section class="card p-4">
            <h2 class="mb-3" id="form-title">Create Product</h2>

            <!-- Alerta de erro (escondido por padrão) -->
            <div id="form-error" class="alert alert-danger d-none" role="alert"></div>

            <form id="create-product-form" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>

                <div class="col-md-3">
                    <label for="price" class="form-label">Price</label>
                    <input type="text" class="form-control" id="price" name="price" required>
                </div>

                <div class="col-md-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" name="stock" required>
                </div>

                <div class="col-md-3">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" name="category" required>
                </div>

                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-dark flex-fill">Create</button>
                    <button type="button" id="cancel-edit" class="btn btn-outline-secondary" style="display:none;">Cancel</button>
                </div>
            </form>
        </section>

        <br>

        <section class="card p-4 mb-4">
            <h2 class="mb-3">Products</h2>
            <form id="search-product-form" class="row g-3 align-items-end" method="get">
                <label for="search" class="form-label"></label>
                <input type="text" class="form-control" id="search" name="search" placeholder="Search" required>
            </form>
            <br>
            <div class="row g-3" id="products"></div>
        </section>   
    </main>
    <script type="module" src="app.js"></script>

    <!-- Bootstrap JS -->
     <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>

</html>
